packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@simplewebauthn/browser": ^13.3.0
  "@simplewebauthn/server": ^13.3.0
  "@sveltejs/vite-plugin-svelte": ^7.0.0
  "@types/node": ^24
  "@types/nodemailer": ^7.0.11
  nodemailer: ^8.0.3
  typescript: ^5
  valibot: ^1.3.1
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.13
  vite-plus: ^0.1.13
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.13

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
