  <circle cx="32" cy="44" r="3" fill="#6366f1"/>
  <line x1="32" y1="47" x2="32" y2="55" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="26" y1="50" x2="38" y2="50" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="32" y1="55" x2="27" y2="61" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="55" x2="37" y2="61" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
</svg>
